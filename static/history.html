<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Retrieve your past Eldritch Inbox writing prompts and story extracts.">
  <meta property="og:title" content="Eldritch Inbox — Your Archive">
  <meta property="og:description" content="Retrieve your past Eldritch Inbox writing prompts and story extracts.">
  <meta property="og:type" content="website">
  <title>Eldritch Inbox — Your Archive</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico"> <!--- Writing icon by icon https://icons8.com -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="vignette"></div>

<div class="wrapper">

  <header>
    <h1>Eldritch Inbox</h1>
    <p class="tagline">The darkness remembers what you have seen.</p>
  </header>

  <div class="divider"><span>✎</span></div>

  <div class="card">
    <form id="history-form">

      <div class="form-group">
        <label for="email">
          Email Address &nbsp;<span class="optional">— used when you submitted your images</span>
        </label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="your@email.com"
          autocomplete="email"
          required
          aria-required="true"
        />
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">
        Unearth Your Stories
      </button>

      <div class="loading-bar" id="loading-bar"></div>
      <p class="loading-text" id="loading-text">Searching the archive…</p>

      <div class="error-block" id="error-block" role="alert"></div>

    </form>
  </div>

  <!-- Results -->
  <div class="output-section" id="results-section" aria-live="polite">
    <p class="output-header" id="results-header"></p>
    <div id="results-list"></div>
  </div>

  <nav class="page-nav">
    <a href="/" class="nav-link">← Summon a new story</a>
  </nav>

  <footer>Eldritch Inbox &nbsp;·&nbsp; 2026</footer>

</div>

<script>
  const form        = document.getElementById('history-form');
  const submitBtn   = document.getElementById('submit-btn');
  const loadingBar  = document.getElementById('loading-bar');
  const loadingText = document.getElementById('loading-text');
  const errorBlock  = document.getElementById('error-block');
  const resultsSection = document.getElementById('results-section');
  const resultsHeader  = document.getElementById('results-header');
  const resultsList    = document.getElementById('results-list');

  function setLoading(on) {
    submitBtn.disabled = on;
    submitBtn.textContent = on ? 'Searching the dark…' : 'Unearth Your Stories';
    loadingBar.classList.toggle('active', on);
    loadingText.classList.toggle('active', on);
  }

  function showError(msg) {
    errorBlock.textContent = msg;
    errorBlock.classList.add('visible');
  }

  function hideError() {
    errorBlock.classList.remove('visible');
    errorBlock.textContent = '';
  }

  function formatDate(timestamp) {
    if (!timestamp) return '';
    const date = new Date(timestamp);
    return date.toLocaleDateString('en-GB', {
      day: 'numeric', month: 'long', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function renderResults(entries) {
    resultsList.innerHTML = '';

    if (!entries || entries.length === 0) {
      resultsHeader.textContent = 'No stories found for this address.';
      resultsSection.classList.add('visible');
      return;
    }

    resultsHeader.textContent = `${entries.length} stor${entries.length === 1 ? 'y' : 'ies'} unearthed`;

    entries.forEach((entry, i) => {
      const card = document.createElement('div');
      card.className = 'history-card';

      const timestamp = entry.timestamp ? `<p class="history-date">${formatDate(entry.timestamp)}</p>` : '';

      const storyParagraphs = (entry.extract || '')
        .split(/\n{2,}/)
        .filter(p => p.trim())
        .map(p => `<p>${p.trim()}</p>`)
        .join('');

      card.innerHTML = `
        ${timestamp}
        <div class="prompt-block">
          <p>${entry.prompt ?? 'No prompt recorded.'}</p>
        </div>
        <div class="story-block history-story">
          <div>${storyParagraphs || '<p>No extract recorded.</p>'}</div>
        </div>
        <button class="btn-copy" data-index="${i}" aria-label="Copy story to clipboard">
          Copy to clipboard
        </button>
      `;

      resultsList.appendChild(card);
    });

    // Copy to clipboard buttons
    resultsList.querySelectorAll('.btn-copy').forEach(btn => {
      btn.addEventListener('click', () => {
        const index = parseInt(btn.dataset.index);
        const entry = entries[index];
        const text = `${entry.prompt ?? ''}\n\n${entry.extract ?? ''}`.trim();
        navigator.clipboard.writeText(text).then(() => {
          btn.textContent = '✦ Copied';
          setTimeout(() => { btn.textContent = 'Copy to clipboard'; }, 2000);
        });
      });
    });

    resultsSection.classList.add('visible');
    resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  form.addEventListener('submit', async e => {
    e.preventDefault();
    hideError();
    resultsSection.classList.remove('visible');
    resultsList.innerHTML = '';

    const formData = new FormData(form);
    setLoading(true);

    try {
      const res = await fetch('/history', { method: 'POST', body: formData });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: 'Something went wrong.' }));
        throw new Error(err.detail || `Error ${res.status}`);
      }

      const json = await res.json();
      renderResults(json.entries);

    } catch (err) {
      showError(`Error: ${err.message}`);
    } finally {
      setLoading(false);
    }
  });
</script>
</body>
</html>

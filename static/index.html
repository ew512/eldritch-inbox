<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eldritch Inbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="vignette"></div>

<div class="wrapper">

  <header>
    <h1> Eldritch Inbox </h1>
    <p class="tagline">Upload a photograph of your world to uncover the darkness it hides.</p>
  </header>

  <div class="divider"><span>✎</span></div>

  <div class="card">
    <form
      id="upload-form"
      action="/submit"
      method="POST"
      enctype="multipart/form-data"
    >

      <!-- Image upload -->
      <div class="form-group">
        <label for="setting_image">Your Setting</label>
        <div
          class="upload-area"
          id="upload-area"
          role="button"
          aria-label="Upload an image of your setting"
          tabindex="0"
        >
          <input
            type="file"
            id="setting_image"
            name="setting_image"
            accept=".jpg,.jpeg,.png,.heic,image/jpeg, image/jpg, image/png, image/heic"
            required
            aria-required="true"
          />
          <p class="upload-label-text">Click or drag an image here</p>
          <p class="upload-hint">JPEG · PNG · HEIC &nbsp;·&nbsp; Max 2.5 MB</p>
        </div>
        <p class="file-chosen" id="file-chosen" aria-live="polite"></p>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">
          Email Address &nbsp;<span class="optional">— optional, for a copy to your inbox</span>
        </label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="your@email.com"
          autocomplete="email"
        />
      </div>

      <!-- Customisation -->
    <div class="form-group customise-group">
      <label as="customise-toggle">
        Customise Your Story &nbsp;<span class="optional">— optional</span>
      </label>

      <button type="button" class="btn-customise" id="customise-toggle" aria-expanded="false" aria-controls="customise-panel">
        <span id="customise-toggle-text">Show options</span>
        <span class="customise-chevron" id="customise-chevron">▾</span>
      </button>

      <div class="customise-panel" id="customise-panel" aria-hidden="true">

        <div class="customise-grid">

          <div class="customise-field">
            <label for="perspective" class="customise-label">Perspective</label>
            <div class="select-wrapper">
              <select id="perspective" name="perspective">
                <option value="third">Third person</option>
                <option value="first">First person</option>
                <option value="second">Second person</option>
              </select>
              <span class="select-arrow">▾</span>
            </div>
          </div>

          <div class="customise-field">
            <label for="tense" class="customise-label">Tense</label>
            <div class="select-wrapper">
              <select id="tense" name="tense">
                <option value="past">Past</option>
                <option value="present">Present</option>
              </select>
              <span class="select-arrow">▾</span>
            </div>
          </div>

          <div class="customise-field customise-field--wide">
            <label class="customise-label">Subgenre</label>
            <div class="subgenre-options" role="group" aria-label="Subgenre">
              <label class="subgenre-option">
                <input type="radio" name="subgenre" value="psychological" checked />
                <span>Psychological</span>
              </label>
              <label class="subgenre-option">
                <input type="radio" name="subgenre" value="gothic" />
                <span>Gothic</span>
              </label>
              <label class="subgenre-option">
                <input type="radio" name="subgenre" value="cosmic" />
                <span>Cosmic</span>
              </label>
              <label class="subgenre-option">
                <input type="radio" name="subgenre" value="supernatural" />
                <span>Supernatural</span>
              </label>
            </div>
          </div>

        </div>
      </div>
    </div>

      <!-- Submit -->
      <button type="submit" class="btn-submit" id="submit-btn">
        Summon the Story
      </button>

      <div class="loading-bar" id="loading-bar"></div>
      <p class="loading-text" id="loading-text">The shadows are stirring…</p>

      <div class="error-block" id="error-block" role="alert"></div>

    </form>
  </div>

  <!-- ── Output ── -->
  <div class="output-section" id="output-section" aria-live="polite">
    <p class="output-header">What the darkness revealed</p>

    <div class="prompt-block">
      <p id="output-prompt"></p>
    </div>

    <div class="story-block">
      <div id="output-story"></div>
    </div>
  </div>

  <nav class="page-nav">
    <a href="/history" class="nav-link">View your past stories →</a>
  </nav>

  <footer>Eldritch Inbox &nbsp;·&nbsp; 2026 </footer>

</div>

<script>
  /* ── File input label ── */
  const fileInput   = document.getElementById('setting_image');
  const fileChosen  = document.getElementById('file-chosen');
  const uploadArea  = document.getElementById('upload-area');

  fileInput.addEventListener('change', () => {
    fileChosen.textContent = fileInput.files.length
      ? `✦ ${fileInput.files[0].name}`
      : '';
  });

  /* Drag-and-drop highlight */
  ['dragover','dragenter'].forEach(e => uploadArea.addEventListener(e, ev => {
    ev.preventDefault(); uploadArea.classList.add('dragover');
  }));
  ['dragleave','drop'].forEach(e => uploadArea.addEventListener(e, () => {
    uploadArea.classList.remove('dragover');
  }));

  /* Keyboard trigger for upload area */
  uploadArea.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') fileInput.click();
  });

  /* ── Form submission ── */
  const form        = document.getElementById('upload-form');
  const submitBtn   = document.getElementById('submit-btn');
  const loadingBar  = document.getElementById('loading-bar');
  const loadingText = document.getElementById('loading-text');
  const errorBlock  = document.getElementById('error-block');
  const outputSec   = document.getElementById('output-section');
  const outputPrompt= document.getElementById('output-prompt');
  const outputStory = document.getElementById('output-story');

  function setLoading(on) {
    submitBtn.disabled = on;
    submitBtn.textContent = on ? 'Listening to the dark…' : 'Summon the Story';
    loadingBar.classList.toggle('active', on);
    loadingText.classList.toggle('active', on);
  }

  function showError(msg) {
    errorBlock.textContent = msg;
    errorBlock.classList.add('visible');
  }

  function hideError() {
    errorBlock.classList.remove('visible');
    errorBlock.textContent = '';
  }

  form.addEventListener('submit', async e => {
    e.preventDefault();
    hideError();
    outputSec.classList.remove('visible');

    const data = new FormData(form);
    setLoading(true);

    try {
      const res = await fetch('/submit', { method: 'POST', body: data });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: 'Something went wrong.' }));
        throw new Error(err.detail || `Error ${res.status}`);
      }

      const json = await res.json();

      /* ── Render output ── */
      const prompt = json.prompt ?? '';
      const extract  = json.extract ?? '';

      if (prompt || extract) {
        outputPrompt.textContent = prompt;

        // Wrap paragraphs
        outputStory.innerHTML = extract
          .split(/\n{2,}/)
          .filter(p => p.trim())
          .map(p => `<p>${p.trim()}</p>`)
          .join('');

        outputSec.classList.add('visible');
        outputSec.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

    } catch (err) {
      showError(`Error: ${err.message}`);
    } finally {
      setLoading(false);
    }
  });

  /* ── Customise toggle ── */
  const customiseToggle = document.getElementById('customise-toggle');
  const customisePanel  = document.getElementById('customise-panel');
  const customiseText   = document.getElementById('customise-toggle-text');
  const customiseChevron = document.getElementById('customise-chevron');

  customiseToggle.addEventListener('click', () => {
    const open = customisePanel.classList.toggle('open');
    customiseToggle.setAttribute('aria-expanded', open);
    customisePanel.setAttribute('aria-hidden', !open);
    customiseText.textContent = open ? 'Hide options' : 'Show options';
    customiseChevron.style.transform = open ? 'rotate(180deg)' : 'rotate(0deg)';
  });
</script>
</body>
</html>
